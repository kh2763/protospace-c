<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="ja">

  <head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
    <title>ProtoSpace</title>
  </head>

  <body>
    <div th:insert="~{header :: header}"></div>


    <div class="contents row">
      <h2 th:text="${user.userName} +'さんの情報' "></h2>


      <table class="user-info-table">
        <tr>
          <th>名前</th>
          <td th:text="${user.userName}"></td>
        </tr>

        <tr>
          <th>プロフィール</th>
          <td th:text="${user.profile}"></td>
        </tr>

        <tr>
          <th>所属</th>
          <td th:text="${user.team}"></td>
        </tr>

        <tr>
          <th>役職</th>
          <td th:text="${user.jobTitle}"></td>
        </tr>
        
      </table>


      <h2 th:text="${user.userName} +'さんのプロトタイプ' "></h2>

      <!-- <div th:each="tweet : ${tweets}">
        <div th:replace="~{tweets/tweet :: content(tweet=${tweet}) }"></div>
      </div> -->



    </div>

    <div th:insert="~{footer :: footer}"></div>
  </body>

</html>
