<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

  <head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
    <title>ProtoSpace</title>
  </head>

  <body>
    <main class="main">

      <div th:insert="~{header :: header}"></div>

      <div class="inner">
        
        <h2 class="greeting" th:text="${user.userName} +'さんの情報' "></h2>

        <table class="user-info-table">
          <tr>
            <th>名前</th>
            <td th:text="${user.userName}"></td>
          </tr>
          <tr>
            <th>プロフィール</th>
            <td th:text="${user.profile}"></td>
          </tr>
          <tr>
            <th>所属</th>
            <td th:text="${user.team}"></td>
          </tr>
          <tr>
            <th>役職</th>
            <td th:text="${user.jobTitle}"></td>
          </tr>
        </table>

        <h2 class="greeting" style="margin-top: 40px;" th:text="${user.userName} +'さんのプロトタイプ' "></h2>

        <div class="card__wrapper">
          <div class="card" th:each="prototype : ${prototypes}">
            
            <a th:href="@{/prototypes/detail/{prototypeId}(prototypeId=${prototype.id})}">
              <img th:src="@{/prototypes/image/{id}(id=${prototype.id})}" class="card__img" alt="プロトタイプ画像" />
            </a>

            <div class="card__body">
              <a th:href="@{/prototypes/detail/{prototypeId}(prototypeId=${prototype.id})}" class="card__title" th:text="${prototype.title}">プロトタイプ名</a>
              
              <p class="card__summary" th:text="${prototype.catchcopy}">キャッチコピー</p>
              
              <a th:href="@{/users/{id}(id=${prototype.user.id})}" class="card__user" th:text="'by ' + ${prototype.user.userName}">by 投稿者</a>
            </div>

          </div>
        </div>

      </div>

      <div th:insert="~{footer :: footer}"></div>

    </main>
  </body>
</html>
